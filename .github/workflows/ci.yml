name: Efficio CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies for PySide6
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libxkbcommon-x11-0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render-util0 \
          libxcb-xinerama0 \
          libxcb-xfixes0 \
          libxcb-cursor0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-util1 \
          libxcb-xinput0 \
          x11-utils \
          libegl1 \
          libgl1 \
          libglib2.0-0 \
          libdbus-1-3 \
          libfontconfig1 \
          libxrender1 \
          libxi6 \
          libxtst6

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-qt pytest-xvfb

    - name: Lint with Flake8
      run: |
        # E402: imports not at top, W503/W504: line breaks around operators
        flake8 src/ --max-line-length=100 --ignore=E402,W503,W504

    - name: Verify Qt Platform Plugin Dependencies
      run: |
        PYSIDE_PATH=$(python -c "import PySide6, os; print(os.path.dirname(PySide6.__file__))")
        PLATFORM_PLUGIN="$PYSIDE_PATH/Qt/plugins/platforms/libqxcb.so"
        echo "Checking: $PLATFORM_PLUGIN"
        if [ -f "$PLATFORM_PLUGIN" ]; then
          # We use '|| true' so grep doesn't exit with 1 if no missing libs are found
          ldd "$PLATFORM_PLUGIN" | grep "not found" || echo "All system libraries are present."
        else
          echo "Error: Platform plugin not found!"
          exit 1
        fi

    - name: Run Automated UI Tests
      env:
        QT_QPA_PLATFORM: xcb
        QT_X11_NO_MITSHM: 1
        # Set PYTHONPATH so pytest can find your 'src' folder
        PYTHONPATH: ${{ github.workspace }}/src
        QT_QPA_PLATFORM_PLUGIN_PATH: ${{ env.pythonLocation }}/lib/python3.11/site-packages/PySide6/Qt/plugins
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
        pytest tests/automation/test_features.py -v
