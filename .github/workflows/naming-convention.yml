name: Enforce Naming Convention

on:
  push:
  pull_request:

jobs:
  check-commit-message:
    runs-on: ubuntu-latest
    steps:
      - name: Check commit messages
        uses: actions/github-script@v7
        with:
          script: |
            // Regex enforces: type: [Hierarchical-ID] description
            const pattern = /^(ftr|htfx|epc|tsk|dcmnt|upd|chore|refactor):\s\[([A-Z0-9-]+|No-ID)\]\s.+/i;
            
            const commits = context.payload.commits || [];

            for (const commit of commits) {
              const message = commit.message.split('\n')[0]; // Only check the subject line
              if (!pattern.test(message)) {
                core.setFailed(`
            Invalid commit message: "${message}"

            Required format (CONTRIBUTING.md Standards):
            type: [Hierarchical-ID] description [#GitHubID]

            Allowed types:
            ftr, htfx, epc, tsk, dcmnt, upd, chore, refactor
            
            Valid Examples:
            ftr: [FT01] built search bar [#26]
            chore: [No-ID] clean up files
                `);
              }
            }

  check-pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const pattern = /^(ftr|htfx|epc|tsk|dcmnt|upd|chore|refactor):\s\[([A-Z0-9-]+|No-ID)\]\s.+/i;
            const title = context.payload.pull_request.title;

            if (!pattern.test(title)) {
              core.setFailed(`
            Invalid PR title: "${title}"

            Required format (CONTRIBUTING.md Standards):
            type: [Hierarchical-ID] description (#GitHubID)

            Allowed types:
            ftr, htfx, epc, tsk, dcmnt, upd, chore, refactor
            
            Valid Examples:
            ftr: [FT01] built search bar (#26)
            chore: [No-ID] clean up files
              `);
            }
